<!doctype html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Spin &amp; Skandale</title><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"><style>:root{--ink:#14181c;--ink2:#1b2127;--paper:#f2eee3;--paper2:#e7e1d2;--green:#6b9e78;--greend:#4d7a59;--red:#d13b2e;--redd:#a82d23;--gold:#c9a24b;--line:#2c353d;--linep:#d4cdbb}*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:radial-gradient(900px 500px at 70% -10%,#1f272e 0,transparent 60%),var(--ink);color:var(--paper);min-height:100vh;display:flex;justify-content:center;padding:18px 16px 40px}.stage{width:100%;max-width:640px;display:flex;flex-direction:column;gap:14px}.bar{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}.logo{font-family:Oswald,sans-serif;font-weight:700;font-size:22px;text-transform:uppercase}.amp{color:var(--red);font-style:italic}.tag,.casecount,.rec-lbl,.meta,.cardsub,.vsub,.footer{font-family:"Space Mono",monospace}.tag{font-size:11px;color:#8a8f94;text-transform:uppercase;letter-spacing:2px}.casecount{font-size:12px;color:var(--gold)}.record{display:none;align-items:center;gap:10px;background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:11px 14px}.segs{display:flex;gap:5px;flex:1}.seg{flex:1;height:18px;border-radius:4px;background:#0d1115;display:grid;place-items:center;font:700 11px "Space Mono",monospace;color:white}.seg.r{background:var(--green)}.seg.w{background:var(--red)}.seg.cur{box-shadow:0 0 0 2px var(--gold)}.rec-lbl{font-size:11.5px;color:#aeb4ba;white-space:nowrap}.rec-lbl b{color:var(--green)}.card{background:linear-gradient(180deg,var(--paper),var(--paper2));color:#1c1a17;border-radius:6px;padding:26px 24px 24px;box-shadow:0 24px 60px -18px rgba(0,0,0,.65);position:relative;overflow:hidden;border:1px solid var(--linep)}.card:before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:repeating-linear-gradient(90deg,var(--red) 0 22px,#b5b0a2 22px 30px)}.card:after{content:"FORTROLIGT";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font:700 clamp(48px,15vw,80px) Oswald,sans-serif;letter-spacing:8px;color:rgba(168,45,35,.06);pointer-events:none}.card>*{position:relative;z-index:1}.stamp{position:absolute;top:18px;right:-6px;transform:rotate(7deg);font:700 13px Oswald,sans-serif;letter-spacing:3px;text-transform:uppercase;color:var(--red);border:2.5px solid var(--red);border-radius:4px;padding:4px 10px;opacity:.78;z-index:3}.meta{font-size:11px;color:#7a7464;letter-spacing:1px;text-transform:uppercase;margin:6px 0 2px}.country{display:inline-block;font:700 12px Oswald,sans-serif;letter-spacing:2.5px;text-transform:uppercase;color:var(--paper);background:#2c2823;padding:4px 11px;border-radius:4px;margin:2px 0 9px}.case-title,.cover-title,.verdict,.rank-badge,.bigscore,.prompt,.btn{font-family:Oswald,sans-serif}.case-title{font-weight:700;font-size:clamp(26px,7vw,38px);line-height:1.02;text-transform:uppercase;margin:2px 0 12px;color:#16140f}.cardsub{font-size:11px;color:#7a7464;margin:-4px 0 14px}.situation,.consequence{font-size:15.5px;line-height:1.55;color:#2c2823}.prompt{font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#6b6457;margin:20px 0 10px;display:flex;align-items:center;gap:8px}.prompt:after{content:"";flex:1;height:1px;background:var(--linep)}.choices{display:flex;flex-direction:column;gap:10px}.choice{text-align:left;width:100%;cursor:pointer;background:#fbf9f3;border:1.5px solid var(--linep);border-radius:6px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;font:inherit;font-size:14.5px;line-height:1.45;color:#2a2620}.choice:hover{transform:translateY(-1px);border-color:#9c9482;background:#fff}.key{font:700 18px Oswald,sans-serif;width:30px;height:30px;flex:none;border-radius:50%;display:grid;place-items:center;background:var(--ink);color:var(--paper)}.verdict{display:flex;align-items:center;gap:11px;font-weight:700;font-size:clamp(24px,7vw,30px);text-transform:uppercase;margin-bottom:4px}.dot{width:15px;height:15px;border-radius:50%;flex:none}.good{color:var(--greend)}.bad{color:var(--redd)}.good .dot{background:var(--green)}.bad .dot{background:var(--red)}.vsub{font-size:12px;color:#6b6457;margin-bottom:14px}.truth{margin-top:16px;padding:13px 15px;background:rgba(0,0,0,.05);border-left:3px solid var(--gold);border-radius:4px;font-size:13.5px;line-height:1.5;color:#4a443a}.lab{font:10.5px "Space Mono",monospace;letter-spacing:1.2px;text-transform:uppercase;color:#7a7464;display:block;margin-bottom:7px}.tag2{display:inline-block;font:700 11px "Space Mono",monospace;padding:3px 9px;border-radius:20px;margin-bottom:8px}.right{background:rgba(107,158,120,.2);color:var(--greend)}.wrong{background:rgba(209,59,46,.16);color:var(--redd)}.actions{margin-top:18px;display:flex;justify-content:flex-end}.btn{font-weight:600;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:0;border-radius:6px;padding:13px 24px;background:var(--ink);color:var(--paper)}.btn.go{background:var(--greend)}.btn.big{font-size:18px;padding:16px 32px}.cover-title{font-weight:700;font-size:clamp(34px,9vw,52px);line-height:.98;text-transform:uppercase;color:#16140f;margin:6px 0 2px}.cover-sub{font:300 clamp(15px,4vw,19px) Oswald,sans-serif;letter-spacing:5px;text-transform:uppercase;color:#7a7464;margin-bottom:16px}.dossier{border-top:1px solid var(--linep);border-bottom:1px solid var(--linep);padding:12px 0;margin:0 0 16px;display:flex;flex-direction:column;gap:8px}.drow{display:flex;gap:12px;align-items:center;font-size:13.5px}.dk{font:10.5px "Space Mono",monospace;letter-spacing:1.2px;text-transform:uppercase;color:#7a7464;width:92px;flex:none}.redact{display:inline-block;height:15px;background:#1c1a17;border-radius:2px}.screen{background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:34px 28px;box-shadow:0 24px 60px -18px rgba(0,0,0,.65)}.kicker{font:12px "Space Mono",monospace;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}.bigscore{font-weight:700;font-size:54px}.rank-badge{font-weight:700;font-size:clamp(26px,7vw,40px);text-transform:uppercase;margin:18px 0 10px}.lede{font-size:15.5px;line-height:1.6;color:#cfd4d8;max-width:54ch}.league{margin-top:24px;border-top:1px solid var(--line);padding-top:18px}.league h3{font:600 13px Oswald,sans-serif;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}.lsub{font-size:13px;color:#9aa0a6;margin-bottom:14px}.leg{display:flex;gap:12px;padding:11px 13px;border-radius:9px;background:#222a31;margin-bottom:8px}.leg.me{border:1px solid var(--gold);background:rgba(201,162,75,.12)}.rk{font:700 18px Oswald,sans-serif;color:var(--gold);width:22px;text-align:center}.nm{font:600 15px Oswald,sans-serif;color:var(--paper)}.you{font:9px "Space Mono",monospace;background:var(--gold);color:var(--ink);padding:2px 7px;border-radius:10px;text-transform:uppercase;margin-left:8px}.ds{font-size:12.5px;line-height:1.45;color:#aab0b6;margin-top:3px}.footer{text-align:center;font-size:10.5px;color:#566069;line-height:1.6;margin-top:4px}.footer span{color:var(--green)}.fade{animation:fade .35s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}</style></head><body><div class="stage"><header class="bar"><div><span class="logo">Spin <span class="amp">&amp;</span> Skandale</span> <span class="tag">Krisemanageren</span></div><span class="casecount" id="casecount"></span></header><div class="record" id="record"><div class="segs" id="segs"></div><span class="rec-lbl" id="rec-lbl"><b>0</b> rigtige</span></div><div id="app"></div><div class="footer">Satire · alle sager bygger på virkelige politiske skandaler<br>Spil og koncept · <span>Krisemanageren</span></div></div><script>const LEVELS=[{titel:"Watergate",based:"USA · Richard Nixon · 1972-74",situation:"Folk med forbindelse til præsidentens kampagne er fanget i et indbrud i oppositionens hovedkvarter. Sporene peger opad, og der findes båndoptagelser fra Det Ovale Værelse.",rigtige:{tekst:"Læg det hele frem, udlever båndene, og saml op om efterforskningen, også hvor det gør ondt.",kon:"Pressen og domstolene får, hvad de beder om, og du fjerner selve mørklægningsanklagen."},forkerte:{tekst:"Benægt enhver viden, brug magtapparatet til at stoppe efterforskningen, og hold på båndene.",kon:"Et øjeblik holder muren, men pressen graver, og båndene findes alligevel. Mørklægningen bliver større end indbruddet."},virkelighed:"Nixon valgte mørklægningen og trådte tilbage i 1974.",valgteRigtigt:false},{titel:"Lewinsky-sagen",based:"USA · Bill Clinton · 1998",situation:"Det kommer frem, at præsidenten har haft et forhold til en ung praktikant. Han bliver bedt om at svare på det, under ed.",rigtige:{tekst:"Erkend forholdet med det samme, undskyld offentligt, og lad være med at lyve under ed.",kon:"Pressen får sin indrømmelse, og du undgår den langt farligere menedanklage."},forkerte:{tekst:"Benægt det hele kategorisk og offentligt, også under ed.",kon:"Nu handler sagen ikke om affæren, men om løgn under ed, og det udløser en rigsretssag."},virkelighed:"Clinton benægtede først kategorisk og blev stillet for en rigsret, men frikendt i Senatet.",valgteRigtigt:false},{titel:"Svinebugten",based:"USA · John F. Kennedy · 1961",situation:"En hemmelig invasion, du som ny præsident godkendte, er slået fuldstændig fejl og er en offentlig ydmygelse.",rigtige:{tekst:"Tag det fulde ansvar offentligt som landets leder, uanset hvem der planlagde fiaskoen.",kon:"Pressen afvæbnes, baglandet samler sig, og et nederlag bliver vendt til respekt."},forkerte:{tekst:"Skub ansvaret over på efterretningstjenesten og militæret.",kon:"Det ligner en leder, der ikke tør stå ved sine beslutninger. Pressen lugter svaghed."},virkelighed:"Kennedy tog det fulde ansvar offentligt, og hans popularitet steg markant.",valgteRigtigt:true},{titel:"Profumo-sagen",based:"Storbritannien · John Profumo · 1963",situation:"Krigsministeren har haft en affære med en ung kvinde, der samtidig omgikkes en sovjetisk diplomat. Han bliver spurgt direkte i Underhuset.",rigtige:{tekst:"Fortæl sandheden om affæren med det samme, også over for parlamentet.",kon:"Pinligt, men du undgår den dødelige anklage om at have løjet for parlamentet."},forkerte:{tekst:"Benægt enhver upassende forbindelse direkte i Underhuset.",kon:"Da sandheden kommer frem, vejer løgnen tungere end selve affæren."},virkelighed:"Profumo benægtede affæren i Underhuset og måtte senere træde tilbage i vanære.",valgteRigtigt:false},{titel:"Partygate",based:"Storbritannien · Boris Johnson · 2020-22",situation:"Mens landet er lukket ned, har der været fester i regeringschefens embedsbolig. Pressen og parlamentet spørger, om reglerne blev brudt.",rigtige:{tekst:"Erkend, at der blev holdt fester, undskyld klart, og samarbejd med undersøgelsen.",kon:"Pressen får sin indrømmelse. En hurtig undskyldning er bedre end en langtrukken benægtelse."},forkerte:{tekst:"Afvis, at der var fester, og forsikr parlamentet om, at alle regler blev fulgt.",kon:"Benægtelsen smuldrer billede for billede. Anklagen om at have vildledt parlamentet bliver det farlige."},virkelighed:"Johnson afviste længe regelbrud, fik en bøde og endte med at træde tilbage.",valgteRigtigt:false},{titel:"Cahuzac-sagen",based:"Frankrig · Jérôme Cahuzac · 2013",situation:"Budgetministeren, der bekæmper skattesnyd, anklages for selv at have en hemmelig konto i udlandet.",rigtige:{tekst:"Indrøm kontoen straks, træd tilbage, og lad skattemyndighederne få fuld adgang.",kon:"Ydmygende, men en hurtig exit begrænser skaden for regeringen."},forkerte:{tekst:"Benægt blankt og se forsamlingen i øjnene: der er ingen konto.",kon:"Da kontoen bekræftes, bliver det både løgn for parlamentet og hykleri."},virkelighed:"Cahuzac benægtede kontoen, tilstod senere og blev dømt for skattesvig.",valgteRigtigt:false},{titel:"Wulff-sagen",based:"Tyskland · Christian Wulff · 2011-12",situation:"Forbundspræsidenten er ramt af en sag om et privat lån. En avis er på vej med historien.",rigtige:{tekst:"Lad historien køre, svar åbent på spørgsmålene, og læg dig ikke ud med pressen.",kon:"Lånesagen er ubehagelig, men håndterbar. Du undgår at gøre sagen til et angreb på pressefriheden."},forkerte:{tekst:"Ring til chefredaktøren og efterlad en truende besked for at få historien stoppet.",kon:"Nu handler sagen om et statsoverhoved, der truer pressen."},virkelighed:"Wulff lagde en truende besked på chefredaktørens telefonsvarer og måtte træde tilbage.",valgteRigtigt:false},{titel:"Guttenberg-sagen",based:"Tyskland · Karl-Theodor zu Guttenberg · 2011",situation:"Den populære forsvarsminister beskyldes for at have plagieret store dele af sin doktorafhandling.",rigtige:{tekst:"Erkend plagiatet, læg titlen fra dig, og undskyld for at have vildledt.",kon:"Sagen lukkes hurtigere, og baglandet slipper for daglige afsløringer."},forkerte:{tekst:"Afvis det som absurde anklager, og hold fast i, at afhandlingen er din egen.",kon:"Afvisningen holder ikke, når dokumentationen vokser dag for dag."},virkelighed:"Guttenberg kaldte først anklagerne absurde, men måtte træde tilbage.",valgteRigtigt:false},{titel:"Rob Ford-sagen",based:"Canada · Rob Ford, Toronto · 2013",situation:"Der verserer en video, hvor byens borgmester ryger crack. Han bliver spurgt igen og igen, om videoen findes.",rigtige:{tekst:"Erkend problemet, søg hjælp for misbrug, og vær ærlig om situationen.",kon:"Ydmygende, men fokus kan flytte fra skandale til sygdom og hjælp."},forkerte:{tekst:"Benægt gentagne gange, at videoen overhovedet eksisterer.",kon:"Da politiet bekræfter videoen, står hver benægtelse som en løgn."},virkelighed:"Ford benægtede i månedsvis, indrømmede senere crackrygning og mistede mange beføjelser.",valgteRigtigt:false},{titel:"Nkandla-sagen",based:"Sydafrika · Jacob Zuma · 2014-16",situation:"Det kommer frem, at offentlige midler er brugt på præsidentens private hjem, blandt andet en swimmingpool forklaret som brandsikkerhed.",rigtige:{tekst:"Erkend, at offentlige penge ikke burde være brugt sådan, og betal det omstridte tilbage.",kon:"Du fjerner den værste korruptionsvinkel og undgår en forfatningskrise."},forkerte:{tekst:"Afvis enhver fejl, og fasthold, at alt var nødvendig sikkerhed.",kon:"Bortforklaringerne bliver satire, og landets højeste domstol slår fast, at forfatningen er svigtet."},virkelighed:"Zuma afviste længe fejl, men blev pålagt at betale en del af pengene tilbage.",valgteRigtigt:false}];const LEGENDS=["Grigorij Rasputin","Steve Bannon","Alastair Campbell","Dominic Cummings","Karl Rove","Judy Smith","Martin Rossen"].map((navn,i)=>({navn,desc:["Sibirisk mystiker med enorm indflydelse ved det russiske hof.","Kaosingeniøren bag Trumps valgsejr i 2016.","Tony Blairs frygtede pressechef og et ikon i moderne spin.","Brexit-hjernen med foragt for embedsværket.","Bushs datadrevne og nådesløse strateg.","Washingtons mester i krise-PR og inspiration til Scandal.","Mette Frederiksens tidligere stabschef og dansk magtmaskinrum."][i]}));let state={i:0,history:[],rigtige:0,slots:{},started:false,deck:[]};const app=document.getElementById('app'),record=document.getElementById('record'),segs=document.getElementById('segs'),recLbl=document.getElementById('rec-lbl'),caseCount=document.getElementById('casecount');segs.innerHTML=LEVELS.map((_,i)=>`<span class="seg" id="seg-${i}"></span>`).join('');function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function parse(b){let p=b.split('·').map(s=>s.trim());return{land:p[0]||'',person:p[1]||'',aar:p[p.length-1]||''}}function renderRecord(){LEVELS.forEach((_,i)=>{let s=document.getElementById('seg-'+i);s.className='seg'+(state.history[i]===true?' r':state.history[i]===false?' w':'');s.textContent=state.history[i]===true?'✓':state.history[i]===false?'✗':'';if(i===state.i&&state.history[i]===undefined)s.classList.add('cur')});recLbl.innerHTML=`<b>${state.rigtige}</b> rigtige`}function intro(){record.style.display='none';caseCount.textContent='';app.innerHTML=`<div class="card fade"><div class="stamp">Klassificeret</div><div class="meta">Sagsmappe // kun til dine øjne</div><h1 class="cover-title">Spin <span class="amp">&amp;</span> Skandale</h1><div class="cover-sub">Krisemanageren</div><div class="dossier"><div class="drow"><span class="dk">Klient</span><span class="redact" style="width:150px"></span></div><div class="drow"><span class="dk">Din status</span><span>Praktikant uden referencer</span></div><div class="drow"><span class="dk">Opgave</span><span>10 skandaler. Imponér ligaen.</span></div></div><p class="situation">Du er ny i krisekommunikationens skyggeverden. Hver sag giver dig to træk. Ét er ansvarligt, ét er spin. De ser ens ud, og rækkefølgen skifter.</p><p class="situation" style="margin-top:12px">Bagefter får du at vide, om du valgte rigtigt, og hvad de virkelige personer gjorde.</p><button class="btn go big" id="start" style="margin-top:18px">📞 Tag telefonen ▸</button></div>`;document.getElementById('start').onclick=startGame}function startGame(){state={i:0,history:[],rigtige:0,slots:{},started:true,deck:shuffle([...Array(LEVELS.length).keys()])};record.style.display='flex';showCase()}function showCase(){let lv=LEVELS[state.deck[state.i]],b=parse(lv.based),order=Math.random()<.5?['rigtige','forkerte']:['forkerte','rigtige'];state.slots={0:order[0],1:order[1]};caseCount.textContent='SAG '+(state.i+1)+' / 10';renderRecord();app.innerHTML=`<div class="card fade"><div class="stamp">Aktiv sag</div><div class="meta">Sag nr. ${String(state.i+1).padStart(2,'0')}</div><div class="country">${b.land}</div><h2 class="case-title">${lv.titel}</h2><div class="cardsub">${b.person} · ${b.aar}</div><p class="situation">${lv.situation}</p><div class="prompt">Dit træk som konsulent</div><div class="choices">${[0,1].map(i=>`<button class="choice" data-slot="${i}"><span class="key">${i?'B':'A'}</span><span>${lv[order[i]].tekst}</span></button>`).join('')}</div></div>`;app.querySelectorAll('.choice').forEach(x=>x.onclick=()=>choose(+x.dataset.slot))}function choose(slot){let lv=LEVELS[state.deck[state.i]],b=parse(lv.based),role=state.slots[slot],good=role==='rigtige';state.history[state.i]=good;if(good)state.rigtige++;renderRecord();let real=lv.valgteRigtigt,cmp=real===good?'samme som dit valg':'modsat dit valg';app.innerHTML=`<div class="card fade"><div class="stamp" style="${good?'color:var(--green);border-color:var(--green)':''}">${good?'Rigtigt':'Forkert'}</div><div class="meta">Sag nr. ${String(state.i+1).padStart(2,'0')} · dit valg</div><div class="country">${b.land}</div><h2 class="case-title">${lv.titel}</h2><div class="verdict ${good?'good':'bad'}"><span class="dot"></span>${good?'Rigtigt svar':'Forkert svar'}</div><div class="vsub">Du valgte: ${good?'det ansvarlige træk':'spin-vejen'}</div><p class="consequence">${lv[role].kon}</p><div class="truth"><span class="lab">Sådan gik det i virkeligheden · ${b.aar}</span><span class="tag2 ${real?'right':'wrong'}">Virkeligheden valgte ${real?'det rigtige':'spin'}</span> · ${cmp}<div style="margin-top:8px">${lv.virkelighed}</div></div><div class="actions"><button class="btn ${state.i===LEVELS.length-1?'go ':''}big" id="next">${state.i===LEVELS.length-1?'Se dit jobtilbud':'Næste sag'} ▸</button></div></div>`;document.getElementById('next').onclick=()=>{if(state.i===LEVELS.length-1)ending();else{state.i++;showCase()}}}function ending(){let r=state.rigtige,idx=r>=5?10-r:6,rec=LEGENDS[idx],farve=r>=5?'var(--green)':'var(--red)';caseCount.textContent='AUDITION SLUT';app.innerHTML=`<div class="screen fade"><div class="kicker" style="color:${farve}">Ligaen har set dig</div><div class="bigscore" style="color:${farve}">${r} / 10</div><div class="cardsub" style="color:#9aa0a6">sager reddet</div><h2 class="rank-badge" style="color:${farve}">${rec.navn} ringer</h2><p class="lede">Din telefon ringer. Det er <b>${rec.navn}</b>. Ligaen har fulgt din håndtering af alle ti sager. ${r>=5?'Du har imponeret nok til at få en ny opgave.':'Du ramte ikke de internationale stjerner, men maskinrummet kan stadig bruge dig.'}</p><div class="league"><h3>Spindoktor-ligaen</h3><div class="lsub">Jo flere sager du redder, jo højere i ligaen rækker du.</div>${LEGENDS.map((L,i)=>`<div class="leg ${i===idx?'me':''}"><div class="rk">${i+1}</div><div><div class="nm">${L.navn}${i===idx?'<span class="you">Ringede til dig</span>':''}</div><div class="ds">${L.desc}</div></div></div>`).join('')}</div><div class="actions" style="justify-content:flex-start"><button class="btn go big" id="again">Tag en ny runde ▸</button></div></div>`;document.getElementById('again').onclick=startGame}document.addEventListener('keydown',e=>{if(!state.started)return;let i=['A','B'].indexOf(e.key.toUpperCase());if(i>=0){let b=app.querySelector('.choice[data-slot="'+i+'"]');if(b)b.click()}});intro();</script></body></html>
