name: Find Jobindsats measurements

on:
  workflow_dispatch:
  push:
    branches:
      - agent/automate-dashboard
    paths:
      - "scripts/discover_jobindsats.py"
      - ".github/workflows/discover-jobindsats.yml"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      JOBINDSATS_API_TOKEN: ${{ secrets.API_ADGANG }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify secret configuration
        run: |
          if [ -z "$JOBINDSATS_API_TOKEN" ]; then
            echo "Secretet API_ADGANG mangler eller er tomt."
            exit 1
          fi

      - name: Fetch Jobindsats metadata
        run: python scripts/discover_jobindsats.py

      - name: Save discovered metadata
        run: |
          if git diff --quiet -- data/jobindsats-discovery.json; then
            echo "Ingen ændringer i Jobindsats-metadata."
            exit 0
          fi
          git config user.name "Dashboard automation"
          git config user.email "dashboard-automation@users.noreply.github.com"
          git add data/jobindsats-discovery.json
          git commit -m "Opdater Jobindsats-metadata"
          git push
